<!DOCTYPE html>
<html>
<head>
    <title>ETL Monitor</title>
    <style>
        /* Estilo para que el botón deshabilitado se vea claramente bloqueado */
        button:disabled {
            background-color: #9ca3af !important;
            color: #ffffff !important;
            cursor: not-allowed;
            opacity: 0.7;
        }

        table { border-collapse: collapse; width: 100%; }
        td, th { padding: 8px 12px; border: 1px solid #eee; text-align: left; }

        .progress-container {
            width: 150px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
            background-color: #f3f4f6;
        }

        .progress-bar {
            transition: width 0.5s ease-in-out, background-color 0.3s;
        }

        .bg-red {
            background-color: #dc2626 !important;
        }

        .bg-green {
            background-color: #16a34a !important;
        }

        .bg-orange {
            background-color: #f59e0b !important;
        }

        .running-animation {
            background-image: linear-gradient(
                45deg, 
                rgba(255, 255, 255, 0.15) 25%, 
                transparent 25%, 
                transparent 50%, 
                rgba(255, 255, 255, 0.15) 50%, 
                rgba(255, 255, 255, 0.15) 75%, 
                transparent 75%, 
                transparent
            );
            background-size: 40px 40px;
            animation: progress-bar-stripes 2s linear infinite;
        }

        @keyframes progress-bar-stripes {
            from { background-position: 40px 0; }
            to { background-position: 0 0; }
        }

        .success { color: #16a34a; font-weight: 600; }
        .failed { color: #dc2626; font-weight: 600; }
        .running { color: #f59e0b; font-weight: 600; }
        .queued { color: #6b7280; }
        
    </style>
</head>

<body>
    <h1>🚀 Monitor ETL</h1>
    
    <form id="pipeline-form" method="post" action="{% url 'run_pipeline' %}">
        {% csrf_token %}
        <button id="run-btn" type="submit">
            ▶ Ejecutar pipeline
        </button>
    </form>


    <hr>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Status</th>
                <th>Inicio</th>
                <th>Progreso</th>
            </tr>
        </thead>
        <tbody>
            {% for run in runs %}
            <tr>
                <td><a href="/run/{{ run.dag_run_id }}/">{{ run.dag_run_id }}</a></td>
                <td id="status-{{ run.dag_run_id }}" class="{{ run.status }}">
                    {{ run.status|upper }}
                </td>
                <td>{{ run.created_at }}</td>
                <td>
                    <div class="progress-container">

                        <div id="bar-{{ run.dag_run_id }}" 
                             class="progress-bar {% if run.status == 'success' %}bg-green{% elif run.status == 'failed' %}bg-red{% else %}bg-orange{% endif %}" 
                             style="width: {{ run.progress|default:0 }}%;">
                            <span id="progress-{{ run.dag_run_id }}">{{ run.progress|default:0 }}%</span>
                        </div>


                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>

        const runBtn = document.getElementById("run-btn");
        const form = document.getElementById("pipeline-form");
        let isLaunching = false;

        form.addEventListener("submit", function(e) {

            if (isLaunching) {
                e.preventDefault();
                return;
            }

            isLaunching = true;
            runBtn.disabled = true; 
            runBtn.innerText = "⏳ Ejecutando...";

            // Set protector shield 6 seg.
            setTimeout(() => {
                isLaunching = false;
                checkGlobalButtonState(); 
            }, 6000);
        });

        function checkGlobalButtonState() {
            if (isLaunching) return;

            const isAnyRunning = document.querySelector(".running") !== null;
            const isAnyQueued = document.querySelector(".queued") !== null;

            if (isAnyRunning || isAnyQueued) {
                runBtn.disabled = true;
                runBtn.innerText = "⏳ Ejecutando...";
            } else {
                runBtn.disabled = false;
                runBtn.innerText = "▶ Ejecutar pipeline";
            }
        }

        async function updateRun(dagRunId) {
            try {
                const res = await fetch(`/status/${encodeURIComponent(dagRunId)}/`);
                if (!res.ok) throw new Error("Server error");
                const data = await res.json();

                const statusEl = document.getElementById(`status-${dagRunId}`);
                const progressEl = document.getElementById(`progress-${dagRunId}`);
                const barEl = document.getElementById(`bar-${dagRunId}`);
                
                if (!statusEl || !barEl) return;

                const state = data.status.toLowerCase();

                // Solo actualizamos el DOM si el estado cambió (mejora rendimiento)
                if (statusEl.className !== state) {
                    statusEl.className = state;
                    statusEl.innerText = state.toUpperCase();
                }

                const progress = data.progress || 0;
                barEl.style.width = `${progress}%`;
                progressEl.innerText = `${progress}%`;

                // 2. Lógica de colores por estado
                if (state === 'failed') {
                    barEl.className = "progress-bar bg-red"; // Rojo si falla
                } else if (state === 'success') {
                    barEl.className = "progress-bar bg-green"; // Verde si terminó bien
                } else if (state === 'running') {
                    barEl.className = "progress-bar bg-orange running-animation"; // Naranja animado si corre
                } else {
                    barEl.className = "progress-bar bg-orange"; // Naranja fijo para 'queued' u otros
                }

            } catch (error) {
                console.error("Error en updateRun:", error);
            }
        }

        // --- refresh cicle ---
        setInterval(async () => {
            const statusElements = document.querySelectorAll("[id^='status-']");
            
            // Execute all fetch in paralel
            const updates = Array.from(statusElements).map(el => {
                const dagRunId = el.id.replace("status-", "");
                return updateRun(dagRunId);
            });

            await Promise.all(updates);

            // At end evaluate if the button is enabled
            checkGlobalButtonState();
        }, 3000);

        // load page at firts time
        checkGlobalButtonState();

    </script>
</body>
</html>
